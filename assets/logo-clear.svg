<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background (more distinctive than circle) -->
  <rect x="40" y="40" width="432" height="432" rx="80" fill="url(#bgGradient)" />
  
  <!-- Globe/Internet representation -->
  <circle cx="256" cy="180" r="60" fill="none" stroke="white" stroke-width="8" opacity="0.9"/>
  <ellipse cx="256" cy="180" rx="60" ry="20" fill="none" stroke="white" stroke-width="8" opacity="0.9"/>
  <path d="M196 180 Q256 140, 316 180" fill="none" stroke="white" stroke-width="8" opacity="0.9"/>
  <path d="M196 180 Q256 220, 316 180" fill="none" stroke="white" stroke-width="8" opacity="0.9"/>
  <line x1="256" y1="120" x2="256" y2="240" stroke="white" stroke-width="8" opacity="0.9"/>
  
  <!-- Clear download arrow -->
  <path d="M256 260 L256 340 M220 300 L256 340 L292 300" 
        stroke="url(#arrowGradient)" 
        stroke-width="20" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" />
  
  <!-- Download base/destination -->
  <rect x="180" y="360" width="152" height="20" rx="10" fill="url(#arrowGradient)" />
  
  <!-- Small dots representing files/data -->
  <circle cx="200" cy="340" r="6" fill="white" opacity="0.8"/>
  <circle cx="256" cy="340" r="6" fill="white" opacity="0.8"/>
  <circle cx="312" cy="340" r="6" fill="white" opacity="0.8"/>
</svg>
