<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurboDownloader</title>
  <style>
    body {
      width: 350px;
      height: 500px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a; /* Dark slate 900 */
      color: #e2e8f0; /* Slate 200 */
    }
    
    .header {
      padding: 16px;
      background-color: #1e293b; /* Slate 800 */
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .title {
      font-weight: 600;
      font-size: 16px;
      color: #38bdf8; /* Sky 400 */
    }

    .container {
      padding: 16px;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input {
      flex: 1;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #475569;
      background-color: #334155;
      color: white;
    }

    button {
      padding: 8px 12px;
      background-color: #0284c7; /* Sky 600 */
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }

    button:hover {
      background-color: #0369a1; /* Sky 700 */
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      background-color: #1e293b;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #334155;
    }

    .filename {
      font-size: 13px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .meta {
      font-size: 11px;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 4px;
      background-color: #334155;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background-color: #38bdf8;
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">TurboDownloader</div>
    <div style="font-size: 12px; color: #94a3b8;">v1.0</div>
  </div>

  <div class="container">
    <div class="input-group">
      <input type="text" id="urlInput" placeholder="Enter URL to download...">
      <button id="addBtn">Add</button>
    </div>

    <div class="list" id="downloadList">
      <!-- Items will be injected here -->
      <div class="empty-state">No active downloads</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
