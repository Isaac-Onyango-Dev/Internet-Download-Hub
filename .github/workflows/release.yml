name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
        shell: bash

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify setup:binaries script exists
        run: npm run --list | findstr setup:binaries || echo "WARNING setup:binaries not found"
        shell: cmd

      - name: Download binaries
        run: npm run setup:binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate icons
        run: npm run generate:icons
        continue-on-error: true

      - name: Build Vite frontend
        run: npx vite build

      - name: Build Electron main and preload
        run: npm run build:electron

      - name: Build Windows installer
        run: npx electron-builder build --win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release files
        run: dir release
        shell: cmd

      # Shields.io /github/downloads/.../total only increases when releases have downloadable assets.
      # Fail here if electron-builder produced no .exe — otherwise the job "succeeds" with an empty release.
      - name: Verify Windows installer exists
        shell: pwsh
        run: |
          if (-not (Test-Path "release")) { throw "release/ directory missing" }
          $exes = Get-ChildItem -Path "release" -Filter "*.exe" -File -ErrorAction SilentlyContinue
          if (-not $exes -or $exes.Count -eq 0) {
            throw "No .exe in release/ — GitHub release would have no installer; download counts stay at 0."
          }
          $exes | ForEach-Object { Write-Host "Installer:" $_.Name "(" ([math]::Round($_.Length / 1MB, 1)) "MB)" }

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## Internet Download Hub ${{ github.ref_name }}

            ### Download
            Download the `.exe` installer below and run it on your Windows 10 or Windows 11 PC.
            No additional software required — yt-dlp, FFmpeg, and all dependencies are bundled inside.

            ### How to Install
            1. Download `Internet Download Hub Setup x.x.x.exe` from the assets below
            2. Double click the installer
            3. Follow the installation steps
            4. Open Internet Download Hub from your Start Menu or Desktop

            > **Windows Security Note:** Windows may show a SmartScreen warning because the app is not code-signed.
            > Click **More info → Run anyway** to proceed. This is normal for open source apps.

            ### Supported Sites
            YouTube, Twitter/X, TikTok, Instagram, Facebook, Reddit, Vimeo, and 1000+ more sites.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
